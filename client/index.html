<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="__APP_DESCRIPTION__" />
    <title>__APP_NAME__</title>
    <script>
      // Apply theme before first paint to prevent flash.
      // Handles both raw strings and JSON-serialized values (from useLocalStorage).
      try {
        var s = localStorage.getItem('theme');
        if (s) try { s = JSON.parse(s); } catch(e) {}
        var t = (s === 'light' || s === 'dark' || s === 'system') ? s : 'system';
        var r = t === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : t;
        if (r === 'dark') document.documentElement.classList.add('dark');
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
